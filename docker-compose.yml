services:
  meshcorium:
    build:
      context: .
      dockerfile: Dockerfile
    image: meshcorium:v0.6.1
    container_name: meshcorium
    restart: unless-stopped
    privileged: true
    ports:
      - "${MESHCORIUM_PORT:-8080}:8080"
    environment:
      MESHCORIUM_HOST: "0.0.0.0"
      MESHCORIUM_PORT: "8080"
      MESHCORIUM_CONFIG_DIR: "/etc/meshcorium"
      MESHCORIUM_DATA_DIR: "/var/lib/meshcorium"
      MESHCORIUM_LOG_DIR: "/var/log/meshcorium"
      MESHCORIUM_RELEASE_VERSION: "v0.6.1-docker-usb-ble"
      DBUS_SYSTEM_BUS_ADDRESS: "unix:path=/run/dbus/system_bus_socket"
    volumes:
      - "${MESHCORIUM_HOST_CONFIG_DIR:-/etc/meshcorium}:/etc/meshcorium"
      - "${MESHCORIUM_HOST_DATA_DIR:-/var/lib/meshcorium}:/var/lib/meshcorium"
      - "${MESHCORIUM_HOST_LOG_DIR:-/var/log/meshcorium}:/var/log/meshcorium"
      # Match launcher-style hardware visibility: serial adapters can appear as
      # ttyUSB*, ttyACM*, ttyAMA*, rfkill, or USB bus devices after container start.
      - "${MESHCORIUM_HOST_DEV_DIR:-/dev}:/dev"
      - "${MESHCORIUM_HOST_UDEV_DIR:-/run/udev}:/run/udev:ro"
      # BLE uses the host Linux BlueZ service through the system D-Bus socket.
      - "${MESHCORIUM_HOST_DBUS_DIR:-/run/dbus}:/run/dbus"
