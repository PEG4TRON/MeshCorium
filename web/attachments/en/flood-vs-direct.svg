<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="700" viewBox="0 0 1300 700">
<style>text{font-family:Arial,sans-serif;fill:#d0d8e0}.t{font-size:30px;font-weight:bold}.h{font-size:25px;font-weight:bold}.n{font-size:19px}.node{fill:#1a2d4a;stroke:#24608a;stroke-width:4}.rep{fill:#2a1a08;stroke:#a86600;stroke-width:4}.f{stroke:#d35400;stroke-width:6;fill:none;marker-end:url(#af)}.d{stroke:#2874a6;stroke-width:6;fill:none;marker-end:url(#ad)}.muted{stroke:#aaa;stroke-width:3;stroke-dasharray:8 8}</style><defs><marker id="af" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#d35400" /></marker><marker id="ad" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2874a6" /></marker></defs>
<text x="40" y="45" class="t">Flood and Direct use the same topology but different propagation methods</text>
<text x="240" y="100" class="h">Flood</text><text x="900" y="100" class="h">Direct</text>
<g transform="translate(0,40)"><rect x="70" y="260" width="140" height="75" rx="15" class="node" /><text x="105" y="305" class="n">Source</text><rect x="280" y="125" width="140" height="75" rx="15" class="rep" /><text x="310" y="170" class="n">R1</text><rect x="280" y="395" width="140" height="75" rx="15" class="rep" /><text x="310" y="440" class="n">R2</text><rect x="490" y="260" width="140" height="75" rx="15" class="node" /><text x="515" y="305" class="n">Target</text><path d="M210 280 L280 185" class="f" /><path d="M210 315 L280 415" class="f" /><path d="M420 165 L490 280" class="f" /><path d="M420 430 L490 315" class="f" /><path d="M350 200 L350 395" class="muted" /></g>
<g transform="translate(650,40)"><rect x="70" y="260" width="140" height="75" rx="15" class="node" /><text x="105" y="305" class="n">Source</text><rect x="280" y="125" width="140" height="75" rx="15" class="rep" /><text x="310" y="170" class="n">R1</text><rect x="280" y="395" width="140" height="75" rx="15" class="rep" /><text x="310" y="440" class="n">R2</text><rect x="490" y="260" width="140" height="75" rx="15" class="node" /><text x="515" y="305" class="n">Target</text><path d="M210 280 L280 185" class="d" /><path d="M420 165 L490 280" class="d" /><path d="M210 315 L280 415" class="muted" /><path d="M420 430 L490 315" class="muted" /></g>
<text x="70" y="625" class="n">Flood: several eligible nodes compete to retransmit; the path accumulates.</text><text x="720" y="625" class="n">Direct: the packet carries a path; only the next hop forwards it.</text>
</svg>