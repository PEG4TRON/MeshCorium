<?xml version='1.0' encoding='utf-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="610" viewBox="0 0 1200 610">
<style>text{font-family:Arial,sans-serif;fill:#d0d8e0}.t{font-size:30px;font-weight:bold}.h{font-size:24px;font-weight:bold}.n{font-size:19px}.box{fill:#1a304a;stroke:#3c6e91;stroke-width:4}.arr{stroke:#3c6e91;stroke-width:6;marker-end:url(#a)}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#3c6e91" /></marker></defs>
<text x="40" y="50" class="t">LoRa parameter trade-offs</text>
<rect x="70" y="110" width="300" height="390" rx="18" class="box" /><text x="165" y="155" class="h">Higher SF</text><text x="100" y="210" class="n">+ longer symbol</text><text x="100" y="250" class="n">+ more processing gain</text><text x="100" y="290" class="n">+ receives weaker signals</text><text x="100" y="350" class="n">− lower data rate</text><text x="100" y="390" class="n">− more airtime</text><text x="100" y="430" class="n">− lower network capacity</text>
<rect x="450" y="110" width="300" height="390" rx="18" class="box" /><text x="535" y="155" class="h">Wider BW</text><text x="480" y="210" class="n">+ shorter symbol</text><text x="480" y="250" class="n">+ higher data rate</text><text x="480" y="290" class="n">+ less airtime</text><text x="480" y="350" class="n">− wider noise bandwidth</text><text x="480" y="390" class="n">− lower sensitivity</text><text x="480" y="430" class="n">− more occupied spectrum</text>
<rect x="830" y="110" width="300" height="390" rx="18" class="box" /><text x="915" y="155" class="h">Stronger CR</text><text x="860" y="210" class="n">+ more FEC</text><text x="860" y="250" class="n">+ greater error tolerance</text><text x="860" y="310" class="n">− more redundancy</text><text x="860" y="350" class="n">− more airtime</text><text x="860" y="390" class="n">− lower useful data rate</text>
<text x="90" y="555" class="n">Choose parameters together: increased range is almost always paid for with airtime.</text>
</svg>