<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
<style>text{font-family:Arial,sans-serif;fill:#d0d8e0}.t{font-size:30px;font-weight:bold}.h{font-size:21px;font-weight:bold}.s{font-size:18px}.node{fill:#1a2d4a;stroke:#276a9c;stroke-width:4}.rep{fill:#2a1a08;stroke:#a66b00;stroke-width:4}.msg{stroke:#2874a6;stroke-width:6;marker-end:url(#m)}.ack{stroke:#2e8b57;stroke-width:6;marker-end:url(#a)}</style><defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2874a6"/></marker><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2e8b57"/></marker></defs>
<text x="40" y="50" class="t">Доставка и подтверждение — два независимых прохода по сети</text>
<rect x="60" y="190" width="180" height="90" rx="15" class="node"/><text x="105" y="242" class="h">Sender</text><rect x="360" y="190" width="180" height="90" rx="15" class="rep"/><text x="405" y="242" class="h">Repeater</text><rect x="660" y="190" width="180" height="90" rx="15" class="rep"/><text x="705" y="242" class="h">Repeater</text><rect x="960" y="190" width="180" height="90" rx="15" class="node"/><text x="995" y="242" class="h">Receiver</text>
<line x1="240" y1="210" x2="360" y2="210" class="msg"/><line x1="540" y1="210" x2="660" y2="210" class="msg"/><line x1="840" y1="210" x2="960" y2="210" class="msg"/><text x="500" y="160" class="s">TXT / REQ</text>
<line x1="960" y1="270" x2="840" y2="270" class="ack"/><line x1="660" y1="270" x2="540" y2="270" class="ack"/><line x1="360" y1="270" x2="240" y2="270" class="ack"/><text x="535" y="325" class="s">ACK / bundled ACK</text>
<text x="60" y="400" class="s">TX Done подтверждает только завершение передачи радиочипом. End-to-end ACK требует успешного обратного маршрута.</text>
</svg>