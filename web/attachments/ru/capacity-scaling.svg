<path d="M110 470 C300 430 430 350 560 260 C720 150 910 110 1120 90" class="flood"/><path d="M110 455 C300 440 530 425 760 410 C930 400 1030 390 1120 385" class="direct"/><path d="M110 465 C300 445 480 410 650 360 C820 310 980 290 1120 275" class="reg"/>
<text x="900" y="120" class="s" fill="#e74c3c">неограниченный flood</text><text x="900" y="370" class="s" fill="#2874a6">direct по известному path</text><text x="900" y="260" class="s" fill="#27ae60">flood, ограниченный scope</text><text x="120" y="575" class="s">График качественный: реальная форма зависит от топологии, дублей, задержек и доступности маршрутов.</text>
