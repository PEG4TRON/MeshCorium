<svg xmlns="http://www.w3.org/2000/svg" width="1250" height="600" viewBox="0 0 1250 600">
<style>text{font-family:Arial,sans-serif;fill:#d0d8e0}.t{font-size:30px;font-weight:bold}.h{font-size:21px;font-weight:bold}.s{font-size:18px}.axis{stroke:#333;stroke-width:4}.flood{stroke:#c0392b;stroke-width:6;fill:none}.direct{stroke:#2874a6;stroke-width:6;fill:none}.reg{stroke:#2e8b57;stroke-width:6;fill:none}</style>
<text x="40" y="50" class="t">Упрощённая картина роста радионагрузки</text>
