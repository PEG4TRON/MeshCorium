<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="610" viewBox="0 0 1200 610">
<style>text{font-family:Arial,sans-serif;fill:#d0d8e0}.t{font-size:30px;font-weight:bold}.h{font-size:24px;font-weight:bold}.n{font-size:19px}.box{fill:#1a304a;stroke:#3c6e91;stroke-width:4}.arr{stroke:#3c6e91;stroke-width:6;marker-end:url(#a)}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#3c6e91"/></marker></defs>
<text x="40" y="50" class="t">Компромиссы параметров LoRa</text>
<rect x="70" y="110" width="300" height="390" rx="18" class="box"/><text x="165" y="155" class="h">SF выше</text><text x="100" y="210" class="n">+ длиннее символ</text><text x="100" y="250" class="n">+ больше processing gain</text><text x="100" y="290" class="n">+ приём слабых сигналов</text><text x="100" y="350" class="n">− ниже скорость</text><text x="100" y="390" class="n">− больше airtime</text><text x="100" y="430" class="n">− меньше ёмкость сети</text>
<rect x="450" y="110" width="300" height="390" rx="18" class="box"/><text x="535" y="155" class="h">BW шире</text><text x="480" y="210" class="n">+ короче символ</text><text x="480" y="250" class="n">+ выше скорость</text><text x="480" y="290" class="n">+ меньше airtime</text><text x="480" y="350" class="n">− выше шумовая полоса</text><text x="480" y="390" class="n">− хуже чувствительность</text><text x="480" y="430" class="n">− шире занятый спектр</text>
<rect x="830" y="110" width="300" height="390" rx="18" class="box"/><text x="915" y="155" class="h">CR сильнее</text><text x="860" y="210" class="n">+ больше FEC</text><text x="860" y="250" class="n">+ устойчивость к ошибкам</text><text x="860" y="310" class="n">− больше избыточность</text><text x="860" y="350" class="n">− больше airtime</text><text x="860" y="390" class="n">− ниже полезная скорость</text>
<text x="90" y="555" class="n">Параметры выбирают совместно: улучшение дальности почти всегда оплачивается временем в эфире.</text>
</svg>