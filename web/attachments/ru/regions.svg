<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
<style>text{font-family:Arial,sans-serif;fill:#d0d8e0}.t{font-size:30px;font-weight:bold}.h{font-size:21px;font-weight:bold}.s{font-size:18px}.r{fill:#1a2d4a;stroke:#276a9c;stroke-width:4}.n{fill:#2a1a08;stroke:#a66b00;stroke-width:3}.line{stroke:#52616b;stroke-width:4}.allow{stroke:#2e8b57;stroke-width:6;marker-end:url(#a)}.deny{stroke:#b03a2e;stroke-width:6;stroke-dasharray:9 7}</style><defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2e8b57"/></marker></defs>
<text x="40" y="50" class="t">Regions ограничивают flood, но не заменяют маршрут</text>
<rect x="70" y="110" width="470" height="400" rx="35" class="r"/><text x="235" y="150" class="h">Region A</text><rect x="120" y="220" width="130" height="75" rx="12" class="n"/><text x="155" y="265" class="s">Node A</text><rect x="330" y="220" width="140" height="75" rx="12" class="n"/><text x="362" y="265" class="s">Repeater</text><line x1="250" y1="258" x2="330" y2="258" class="allow"/>
<rect x="660" y="110" width="470" height="400" rx="35" class="r"/><text x="825" y="150" class="h">Region B</text><rect x="710" y="220" width="140" height="75" rx="12" class="n"/><text x="742" y="265" class="s">Repeater</text><rect x="930" y="220" width="130" height="75" rx="12" class="n"/><text x="965" y="265" class="s">Node B</text><line x1="850" y1="258" x2="930" y2="258" class="allow"/>
<line x1="470" y1="258" x2="710" y2="258" class="deny"/><text x="515" y="235" class="s">фильтр transport code</text>
<text x="95" y="450" class="s">Flood разрешён внутри области.</text><text x="685" y="450" class="s">Другой scope может быть отклонён.</text><text x="70" y="565" class="s">Direct-пакет всё равно идёт по path. Region определяет допустимую область распространения transport-пакетов.</text>
</svg>